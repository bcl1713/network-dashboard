[SERVICE]
    Flush         1
    Log_Level     info
    Daemon        Off
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# Receive Suricata EVE JSON via syslog/TCP from OPNsense.
# OPNsense should be configured to ship the raw EVE JSON line as the
# RFC5424 message field.
[INPUT]
    Name          syslog
    Mode          tcp
    Listen        0.0.0.0
    Port          5140
    Parser        syslog-rfc5424
    Tag           opnsense.eve

# Parse the inner EVE JSON out of the syslog "message" field.
[FILTER]
    Name          parser
    Match         opnsense.eve
    Key_Name      message
    Parser        eve_json
    Reserve_Data  On
    Preserve_Key  Off

# If the EVE payload didn't carry a host field, fall back to the syslog header.
[FILTER]
    Name          modify
    Match         opnsense.eve
    Copy          host host_from_syslog

# Geodata
[FILTER]
    Name          geoip2
    Match         opnsense.eve
    Database      /etc/fluent-bit/GeoLite2-City.mmdb
    Lookup_Key    dest_ip
    Record        geoip_country %{country.names.en}
    Record        geoip_city    %{city.names.en}

# 1) Persist the raw event to the file-based archive (audit / replay).
[OUTPUT]
    Name          file
    Match         opnsense.eve
    Path          /raw
    File          eve.ndjson
    Format        plain

# 2) Forward to the engine for normalization, classification, and Loki push.
[OUTPUT]
    Name          http
    Match         opnsense.eve
    Host          engine
    Port          8000
    URI           /ingest/bulk
    Format        json
    Json_Date_Key timestamp
    Json_Date_Format iso8601
    Header        X-API-Token ${ENGINE_API_TOKEN}
    Header        Content-Type application/json
    Retry_Limit   5
