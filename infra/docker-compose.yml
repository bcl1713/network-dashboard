name: network-dashboard

networks:
  idsnet:
    driver: bridge

services:
  engine:
    build:
      context: ../services/engine
      dockerfile: Dockerfile
    image: network-dashboard/engine:dev
    restart: unless-stopped
    environment:
      ENGINE_API_TOKEN: ${ENGINE_API_TOKEN:?set ENGINE_API_TOKEN in .env}
      ENGINE_DB_PATH: ${ENGINE_DB_PATH:-/data/filters.db}
      ENGINE_RING_SIZE: ${ENGINE_RING_SIZE:-750}
      ENGINE_ALLOW_SID_ONLY: ${ENGINE_ALLOW_SID_ONLY:-false}
      ENGINE_LOG_LEVEL: ${ENGINE_LOG_LEVEL:-INFO}
      ENGINE_LOKI_URL: ${ENGINE_LOKI_URL:-http://loki:3100}
      ENGINE_LOKI_TENANT: ${ENGINE_LOKI_TENANT:-filtered}
      TZ: ${TZ:-UTC}
    volumes:
      - ./data/engine:/data
    ports:
      - "10.10.50.13:${ENGINE_HOST_PORT:-8081}:8000"
    networks: [idsnet]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      loki:
        condition: service_started

  ui:
    build:
      context: ../services/ui
      dockerfile: Dockerfile
    image: network-dashboard/ui:dev
    restart: unless-stopped
    environment:
      UI_ENGINE_BASE_URL: ${UI_ENGINE_BASE_URL:-http://engine:8000}
      UI_ENGINE_API_TOKEN: ${ENGINE_API_TOKEN:?set ENGINE_API_TOKEN in .env}
      UI_LOG_LEVEL: ${UI_LOG_LEVEL:-INFO}
      UI_PAGE_SIZE: ${UI_PAGE_SIZE:-50}
      TZ: ${TZ:-UTC}
    ports:
      - "10.10.50.13:${UI_HOST_PORT:-8082}:8000"
    networks: [idsnet]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      engine:
        condition: service_healthy

  fluent-bit:
    image: fluent/fluent-bit:3.1
    restart: unless-stopped
    environment:
      ENGINE_API_TOKEN: ${ENGINE_API_TOKEN:?set ENGINE_API_TOKEN in .env}
      TZ: ${TZ:-UTC}
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./data/raw-eve:/raw
      - ./GeoLite2-City.mmdb:/etc/fluent-bit/GeoLite2-City.mmdb:ro
    ports:
      - "10.10.50.13:${FLUENTBIT_SYSLOG_PORT:-5140}:5140/tcp"
      - "10.10.50.13:${FLUENTBIT_METRICS_PORT:-2020}:2020"
    networks: [idsnet]
    depends_on:
      engine:
        condition: service_healthy

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - ./data/loki:/loki
    ports:
      - "10.10.50.13:${LOKI_HOST_PORT:-3100}:3100"
    networks: [idsnet]
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3100/ready | grep -q ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_FEATURE_TOGGLES_ENABLE: ""
      TZ: ${TZ:-UTC}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards/json:/var/lib/grafana/dashboards:ro
      - ./data/grafana:/var/lib/grafana
    ports:
      - "10.10.50.13:${GRAFANA_HOST_PORT:-3000}:3000"
    networks: [idsnet]
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      loki:
        condition: service_started
